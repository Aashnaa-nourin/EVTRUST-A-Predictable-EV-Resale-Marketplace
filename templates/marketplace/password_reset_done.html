{% extends 'marketplace/base.html' %}

{% block content %}
<style>
    body {
        background: radial-gradient(circle at top left, #1e3a8a, transparent),
                    radial-gradient(circle at bottom right, #0f172a, transparent),
                    #0f172a !important;
        min-height: calc(100vh - 88px);
        display: flex;
        align-items: center;
    }
    .auth-container {
        width: 100%;
        max-width: 500px;
        background: white;
        border-radius: var(--border-radius-lg);
        overflow: hidden;
        box-shadow: 0 50px 100px -20px rgba(0, 0, 0, 0.5);
        margin: 40px auto;
        padding: 50px 40px;
        border: 1px solid rgba(255,255,255,0.05);
        text-align: center;
    }
    .icon-success {
        font-size: 4rem;
        color: #10b981;
        margin-bottom: 16px;
    }
    .auth-title {
        font-weight: 900;
        font-size: 2rem;
        letter-spacing: -1px;
        color: #0f172a;
        margin-bottom: 12px;
    }
    .auth-subtitle {
        color: #64748b;
        font-size: 0.95rem;
        margin-bottom: 30px;
        line-height: 1.5;
    }
    .btn-login {
        display: inline-block;
        width: 100%;
        padding: 15px;
        font-weight: 800;
        font-size: 1rem;
        letter-spacing: 0.3px;
        border-radius: 14px;
        background: #f1f5f9;
        border: none;
        color: #475569;
        text-decoration: none;
        transition: all 0.3s;
    }
    .btn-login:hover {
        background: #e2e8f0;
        color: #1e293b;
    }
</style>

<div class="auth-container animate__animated animate__fadeInUp">
    <div class="icon-success"><i class="bi bi-envelope-check-fill"></i></div>
    <h1 class="auth-title">Check Your Email</h1>
    <p class="auth-subtitle">We've emailed you instructions for setting your password, if an account exists with the email you entered. You should receive them shortly.</p>

    <a href="{% url 'login' %}" class="btn-login">
        Return to Login
    </a>
</div>
{% endblock %}
