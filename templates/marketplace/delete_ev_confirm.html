{% extends 'marketplace/base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card shadow border-danger">
            <div class="card-header bg-danger text-white text-center">
                <h4>Confirm Deletion</h4>
            </div>
            <div class="card-body text-center">
                <p>Are you sure you want to delete the EV listing for <strong>{{ ev.display_name }} ({{ ev.year }})</strong>?</p>
                <form method="post" class="mt-4">
                    {% csrf_token %}
                    <a href="{% url 'seller_ev_list' %}" class="btn btn-secondary">Cancel</a>
                    <button type="submit" class="btn btn-danger ms-2">Yes, Delete</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
