{% extends 'marketplace/base.html' %}

{% block content %}
<style>
    body {
        background: radial-gradient(circle at top left, #1e3a8a, transparent),
                    radial-gradient(circle at bottom right, #0f172a, transparent),
                    #0f172a !important;
        min-height: calc(100vh - 88px);
        display: flex;
        align-items: center;
    }
    .auth-container {
        width: 100%;
        max-width: 500px;
        background: white;
        border-radius: var(--border-radius-lg);
        overflow: hidden;
        box-shadow: 0 50px 100px -20px rgba(0, 0, 0, 0.5);
        margin: 40px auto;
        padding: 50px 40px;
        border: 1px solid rgba(255,255,255,0.05);
        text-align: center;
    }
    .icon-success {
        font-size: 4rem;
        color: #10b981;
        margin-bottom: 16px;
    }
    .auth-title {
        font-weight: 900;
        font-size: 2rem;
        letter-spacing: -1px;
        color: #0f172a;
        margin-bottom: 12px;
    }
    .auth-subtitle {
        color: #64748b;
        font-size: 0.95rem;
        margin-bottom: 30px;
        line-height: 1.5;
    }
    .btn-login {
        width: 100%;
        padding: 15px;
        font-weight: 800;
        font-size: 1rem;
        letter-spacing: 0.3px;
        border-radius: 14px;
        background: linear-gradient(135deg, #1d4ed8, #3b82f6);
        border: none;
        color: white;
        margin-top: 16px;
        transition: all 0.3s;
        box-shadow: 0 8px 20px -4px rgba(59,130,246,0.45);
        display: inline-block;
        text-decoration: none;
    }
    .btn-login:hover {
        background: linear-gradient(135deg, #1e40af, #2563eb);
        transform: translateY(-2px);
        box-shadow: 0 12px 28px -4px rgba(59,130,246,0.55);
        color: white;
    }
</style>

<div class="auth-container animate__animated animate__zoomIn">
    <div class="icon-success"><i class="bi bi-shield-check"></i></div>
    <h1 class="auth-title">Password Restored!</h1>
    <p class="auth-subtitle">Your password has been set. You may go ahead and log in now.</p>

    <a href="{% url 'login' %}" class="btn-login">
        Sign In to EVTrust →
    </a>
</div>
{% endblock %}
