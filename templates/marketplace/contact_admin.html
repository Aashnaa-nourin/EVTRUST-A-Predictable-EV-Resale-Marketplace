{% extends 'marketplace/base.html' %}
{% load static %}

{% block title %}Contact System Administration — EVTrust{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card border shadow-sm rounded-4 mt-4 mb-5">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <div class="d-inline-flex align-items-center justify-content-center bg-primary bg-opacity-10 text-primary rounded-circle mb-3" style="width: 64px; height: 64px; font-size: 1.5rem;">
                        <i class="bi bi-headset"></i>
                    </div>
                    <h2 class="fw-bold">Platform Support</h2>
                    <p class="text-muted">Send a message directly to the administration team. We'll get back to you shortly.</p>
                </div>
                
                <form method="POST" action="{% url 'contact_admin' %}">
                    {% csrf_token %}
                    <div class="mb-4">
                        <label for="message" class="form-label fw-bold">How can we help?</label>
                        <textarea name="message" id="message" class="form-control rounded-3" rows="6" placeholder="Describe your issue or inquiry here..." required></textarea>
                    </div>
                    
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary rounded-pill fw-bold py-2">
                            <i class="bi bi-send me-1"></i> Send Inquiry to Admin
                        </button>
                        <a href="javascript:history.back()" class="btn btn-light border rounded-pill fw-semibold py-2 text-muted">
                            Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
